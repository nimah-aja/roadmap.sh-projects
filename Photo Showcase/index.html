<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
     <meta name="title" content="Photo Showcase">
     <meta name="description" content="Kumpulan Gambar dan Video">
     <meta name="keywords" content="html, roadmap.sh, image, video">
     <meta name="author" content="Nama Orang">

     <!-- Open Graph -->
      <meta property="og:title" content="Photo Showcase">
      <meta property="og:description" content="Kumpulan Gambar dan Video">
      <meta property="og:type" content="website">
      <meta property="og:image" content="../img/profil.jpg">

      <!-- Favicon -->
       <link rel="icon" href="../img/profil.jpg" type="image/jpg">
    <title>Photo Showcase</title>
</head>
<body>
    <!-- Header -->
    <header>
        <img src="../img/gallery.jpg" alt="icon gallery" width="60" height="60">
        <h1>Ours Gallery</h1>

        <br>

        <!-- Navbar -->
         <nav>
            <a href="#images">Gambar</a>
            <a href="#videos">Video</a>
         </nav>
    </header>

    <br>
    <!-- main -->
     <main>
        <!-- Header -->
        <h1>Photo Showcase</h1>
        <p>A collection of images and videos</p>

        <section id="images">
            <h2><u>Images</u></h2>

            <ul>
                <!-- image 1 -->
                <li>
                    <img src="../img/dekoratif.png" alt="" width="200" height="300">
                </li>
                <br>
                 <!-- image 2 -->
                <li>
                    <figure>
                        <img src="../img/image2.jpg" alt="skyscraper building with blue sky" width="200" height="300">
                        <figcaption>
                            skyscraper building with blue sky
                        </figcaption>
                    </figure>
                </li>
                <br>
                <!-- image 3 -->
                <li>
                    <figure>
                        <img src="../img/image3.jpg" alt="yellow expression ball perched on a tree branch" width="200" height="300">
                        <figcaption>
                            yellow expression ball perched on a tree branch
                        </figcaption>
                    </figure>
                </li>
                <br>
                <!-- image 4 -->
                <li>
                    <figure>
                        <img src="../img/image4.jpg" alt="the tree in front of the house gate" width="200" height="300">
                        <figcaption>
                            the tree in front of the house gate
                        </figcaption>
                    </figure>
                </li>
                <br>
               <!-- image 5 -->
                <li>
                    <figure>
                        <img src="../img/image5.jpg" alt="Chinese-themed shop building" width="200" height="300">
                        <figcaption>
                            Chinese-themed shop building
                        </figcaption>
                    </figure>
                </li>
                <br>
                <!-- image 6 -->
                <li>
                    <figure>
                        <img src="../img/image6.jpg" alt="a hand inserts a card into the camera" width="200" height="300">
                        <figcaption>
                            a hand inserts a card into the camera
                        </figcaption>
                    </figure>
                </li>
            </ul>
        </section>
        
        <br>

        <section id="videos">
            <h2><u>Videos</u></h2>
            
            <!-- video 1 -->
             <figure>
                <video width="500" height="300" poster="../img/pkl.png" controls>
                    <source src="../video/intro.mp4" type="video/mp4">
                    Your browser does not support the video tag
                </video>
                <figcaption>
                    intro to run a react js project
                </figcaption>
             </figure>
            
        </section>
     </main>

     <br>

     <footer>
        <p>&copy; Gallery 2026</p>
     </footer>
</body>
</html>
