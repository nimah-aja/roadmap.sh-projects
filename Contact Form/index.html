<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <meta name="title" content="Contact Form">
    <meta name="description" content="Make Contact Form With HTML">
    <meta name="keywords" content="html, roadmap.sh, contact, form">
    <meta name="author" content="Nama Orang">

    <!-- Open Graph -->
     <meta property="og:title" content="Contact Form">
     <meta property="og:description" content="Make Contact Form With HTML">
     <meta property="og:type" content="website">
     <meta property="og:image" content="../img/profil.jpg">

     <!-- Favicon -->
      <link rel="icon" href="../img/profil.jpg" type="image/jpg">
    <title>Contact Form</title>
</head>
<body>
    <!-- Header -->
     <header>
        <h1>Acme Support</h1>

        <!-- Navbar -->
         <nav>
            <a href="home.html">Home</a>
            <a href="help.html">Help</a>
            <a href="contact.html">Contact</a>
         </nav>
     </header>
     <hr>

     <main>
        <h1>Contact Us</h1>
        <p>Send us a message and we will get back to you.</p>

        <!-- Form -->
         <form action="https://.../contact" method="post">
            <table>
                <tr>
                    <td>
                        <label for="nama">Full Name</label>
                    </td>
                    <td>
                        <input type="text" id="nama" name="nama" placeholder="e.g siti ajeng" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="email">Email</label>
                    </td>
                    <td>
                        <input type="email" name="email" id="email"  placeholder="e.g siti@gmail.com" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="subject">Subject</label>
                    </td>
                    <td>
                        <select name="subject" id="subject">
                            <option value="" selected disabled>Select a subject</option>
                            <option value="general inquiry">General Inquiry</option>
                            <option value="technical supprot">Technical Support</option>
                            <option value="billing & payment">Billing & Payment</option>
                            <option value="partnership">Partnership</option>
                            <option value="feedback">Feedback</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="message">Message</label>
                    </td>
                    <td>
                        <textarea name="message" id="message" minlength="20" placeholder="message.." required></textarea>
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <fieldset>
                            <legend>How did your hear about us?</legend>

                            <input type="radio" name="hear" id="search" value="search" checked>
                            <label for="search">Search</label>

                            <input type="radio" name="hear" id="friend" value="friend">
                            <label for="friend">Friend</label>
                            
                            <input type="radio" name="hear" id="socialMedia" value="social media">
                            <label for="socialMedia">Social Media</label>
                        </fieldset>
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <input type="checkbox" name="send" id="send" value="yes">
                        <label for="send">Send me product updates</label>
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <button type="submit">Send message</button>
                    </td>
                </tr>
            </table>
         </form>
     </main>
     <hr>

     <footer>
        <p>&copy; 2026 Acme Support</p>
     </footer>
</body>
</html>
